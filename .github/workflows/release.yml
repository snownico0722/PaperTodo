name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update. Defaults to v<project version>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: false
        default: false
        type: boolean
      stable_release_confirmed:
        description: "Required for stable releases. Confirms final hand checks are complete."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build Windows executables
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build native LMDB library
        run: .\native\lmdb\build.ps1 -Configuration Release -ForceRebuild

      - name: Read project metadata
        id: meta
        run: |
          $project = [xml](Get-Content -LiteralPath .\PaperTodo.csproj -Raw)
          # Multiple PropertyGroups exist; .PropertyGroup.Version is an array that stringifies
          # with a trailing space (e.g. "3.0 "). Read the single Version element instead.
          $versionNodes = $project.SelectNodes('/Project/PropertyGroup/Version')
          if ($versionNodes.Count -ne 1) {
            throw "PaperTodo.csproj must define exactly one <Version> element (found $($versionNodes.Count))."
          }
          $version = ([string]$versionNodes[0].InnerText).Trim()
          if ([string]::IsNullOrWhiteSpace($version) -or $version -match '\s') {
            throw "PaperTodo.csproj <Version> is missing or contains whitespace: '$version'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "self_contained_exe=PaperTodo-v$version-win-x64-self-contained-compressed.exe" >> $env:GITHUB_OUTPUT
          "framework_dependent_exe=PaperTodo-v$version-win-x64-no-runtime-uncompressed.exe" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore .\PaperTodo.csproj

      - name: Publish release executables
        env:
          SELF_CONTAINED_EXE: ${{ steps.meta.outputs.self_contained_exe }}
          FRAMEWORK_DEPENDENT_EXE: ${{ steps.meta.outputs.framework_dependent_exe }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          $selfContainedOut = Join-Path $env:RUNNER_TEMP "publish-self-contained-compressed"
          $frameworkDependentOut = Join-Path $env:RUNNER_TEMP "publish-no-runtime-uncompressed"

          Remove-Item -LiteralPath $releaseDir, $selfContainedOut, $frameworkDependentOut -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $releaseDir, $selfContainedOut, $frameworkDependentOut | Out-Null

          dotnet publish .\PaperTodo.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o $selfContainedOut `
            /p:PublishSingleFile=true `
            /p:PublishReadyToRun=false `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:PublishTrimmed=false `
            /p:DebugType=none `
            /p:DebugSymbols=false

          Copy-Item -LiteralPath (Join-Path $selfContainedOut "PaperTodo.exe") -Destination (Join-Path $releaseDir $env:SELF_CONTAINED_EXE)

          dotnet publish .\PaperTodo.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o $frameworkDependentOut `
            /p:PublishSingleFile=true `
            /p:PublishReadyToRun=false `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=false `
            /p:PublishTrimmed=false `
            /p:DebugType=none `
            /p:DebugSymbols=false

          Copy-Item -LiteralPath (Join-Path $frameworkDependentOut "PaperTodo.exe") -Destination (Join-Path $releaseDir $env:FRAMEWORK_DEPENDENT_EXE)

      - name: Write SHA256 checksums
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          $exeFiles = Get-ChildItem -LiteralPath $releaseDir -Filter "*.exe" -File | Sort-Object Name
          if ($exeFiles.Count -ne 2) {
            throw "Expected exactly 2 release executables, found $($exeFiles.Count)."
          }

          $lines = foreach ($file in $exeFiles) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }

          Set-Content -LiteralPath (Join-Path $releaseDir "SHA256SUMS.txt") -Value $lines -Encoding utf8
          Get-ChildItem -LiteralPath $releaseDir -File | Sort-Object Name | Format-Table Name, Length

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release executables
        env:
          SELF_CONTAINED_EXE: ${{ steps.meta.outputs.self_contained_exe }}
          FRAMEWORK_DEPENDENT_EXE: ${{ steps.meta.outputs.framework_dependent_exe }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          $exeFiles = @(
            (Join-Path $releaseDir $env:SELF_CONTAINED_EXE),
            (Join-Path $releaseDir $env:FRAMEWORK_DEPENDENT_EXE)
          )

          foreach ($exe in $exeFiles) {
            if (-not (Test-Path -LiteralPath $exe -PathType Leaf)) {
              throw "Release executable not found: $exe"
            }

            cosign sign-blob `
              --yes `
              --output-signature "$exe.sig" `
              --output-certificate "$exe.crt" `
              "$exe"
          }

          Get-ChildItem -LiteralPath $releaseDir -File | Sort-Object Name | Format-Table Name, Length

      - name: Upload executable package
        uses: actions/upload-artifact@v4
        with:
          name: PaperTodo-v${{ steps.meta.outputs.version }}-win-x64
          if-no-files-found: error
          path: |
            release/${{ steps.meta.outputs.self_contained_exe }}
            release/${{ steps.meta.outputs.self_contained_exe }}.sig
            release/${{ steps.meta.outputs.self_contained_exe }}.crt
            release/${{ steps.meta.outputs.framework_dependent_exe }}
            release/${{ steps.meta.outputs.framework_dependent_exe }}.sig
            release/${{ steps.meta.outputs.framework_dependent_exe }}.crt
            release/SHA256SUMS.txt

      - name: Resolve release tag
        id: release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "${{ inputs.release_tag }}"
            if ([string]::IsNullOrWhiteSpace($tag)) {
              $tag = "v${{ steps.meta.outputs.version }}"
            }
          }

          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'. Got '$tag'."
          }

          $isStable = $tag -notmatch '(?i)(alpha|beta|preview|rc)'
          $stableConfirmed = "${{ inputs.stable_release_confirmed }}" -eq "true"
          if ($isStable -and "${{ github.event_name }}" -ne "workflow_dispatch") {
            throw "Stable releases must be published from workflow_dispatch after final hand checks. Prerelease tags may still publish from tag pushes."
          }
          if ($isStable -and -not $stableConfirmed) {
            throw "Stable release '$tag' requires stable_release_confirmed=true."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Write release notes
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          $tag = "${{ steps.release.outputs.tag }}"
          $selfContained = "${{ steps.meta.outputs.self_contained_exe }}"
          $frameworkDependent = "${{ steps.meta.outputs.framework_dependent_exe }}"
          $changelogPath = Join-Path $env:GITHUB_WORKSPACE "CHANGELOG.md"
          if (-not (Test-Path -LiteralPath $changelogPath -PathType Leaf)) {
            throw "CHANGELOG.md not found."
          }

          $lines = Get-Content -LiteralPath $changelogPath
          $headingPattern = '^\s*###\s+' + [regex]::Escape($tag) + '(\s|$)'
          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match $headingPattern) {
              $start = $i
              break
            }
          }

          if ($start -lt 0) {
            throw "CHANGELOG.md does not contain a release section for $tag."
          }

          $end = $lines.Count
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^\s*###\s+v') {
              $end = $i
              break
            }
          }

          $changelogNotes = (($lines[($start + 1)..($end - 1)] -join "`n").Trim())
          if ([string]::IsNullOrWhiteSpace($changelogNotes)) {
            throw "CHANGELOG.md section for $tag is empty."
          }

          $notesLines = @(
            $changelogNotes,
            "",
            "下载:",
            "",
            "- 完整版（含 .NET 运行库）：${selfContained}",
            "- 精简版（需自行安装 .NET 运行库）：${frameworkDependent}"
          )

          Set-Content -LiteralPath (Join-Path $releaseDir "RELEASE_NOTES.md") -Value ($notesLines -join "`n") -Encoding utf8

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          $tag = "${{ steps.release.outputs.tag }}"
          $selfContained = "${{ steps.meta.outputs.self_contained_exe }}"
          $frameworkDependent = "${{ steps.meta.outputs.framework_dependent_exe }}"
          $assets = @(
            (Join-Path $releaseDir $selfContained),
            (Join-Path $releaseDir "$selfContained.sig"),
            (Join-Path $releaseDir "$selfContained.crt"),
            (Join-Path $releaseDir $frameworkDependent),
            (Join-Path $releaseDir "$frameworkDependent.sig"),
            (Join-Path $releaseDir "$frameworkDependent.crt"),
            (Join-Path $releaseDir "SHA256SUMS.txt")
          )
          $notes = Join-Path $releaseDir "RELEASE_NOTES.md"
          $isPrerelease = ("${{ inputs.prerelease }}" -eq "true") -or ($tag -match '(?i)(alpha|beta|preview|rc)')
          $expectedAssetNames = @(
            $selfContained,
            "$selfContained.sig",
            "$selfContained.crt",
            $frameworkDependent,
            "$frameworkDependent.sig",
            "$frameworkDependent.crt",
            "SHA256SUMS.txt"
          )

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            $existingAssetNames = @(gh release view $tag --json assets --jq '.assets[].name')
            foreach ($assetName in $existingAssetNames) {
              if ($expectedAssetNames -notcontains $assetName) {
                gh release delete-asset $tag $assetName --yes
              }
            }
            gh release upload $tag @assets --clobber
            gh release edit $tag --title "PaperTodo $tag" --notes-file $notes
            if ($isPrerelease) {
              gh release edit $tag --prerelease
            }
          } else {
            $createArgs = @(
              "release", "create", $tag
            ) + $assets + @(
              "--target", $env:GITHUB_SHA,
              "--title", "PaperTodo $tag",
              "--notes-file", $notes
            )

            if ($isPrerelease) {
              $createArgs += "--prerelease"
            }

            gh @createArgs
          }
