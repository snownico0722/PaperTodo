name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update. Defaults to v<project version>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build Windows executables
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "true"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Read project metadata
        id: meta
        run: |
          $project = [xml](Get-Content -LiteralPath .\PaperTodo.csproj -Raw)
          $version = $project.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "PaperTodo.csproj does not define <Version>."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "self_contained_exe=PaperTodo-v$version-win-x64-self-contained-compressed.exe" >> $env:GITHUB_OUTPUT
          "framework_dependent_exe=PaperTodo-v$version-win-x64-no-runtime-uncompressed.exe" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore .\PaperTodo.csproj

      - name: Publish release executables
        env:
          SELF_CONTAINED_EXE: ${{ steps.meta.outputs.self_contained_exe }}
          FRAMEWORK_DEPENDENT_EXE: ${{ steps.meta.outputs.framework_dependent_exe }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          $selfContainedOut = Join-Path $env:RUNNER_TEMP "publish-self-contained-compressed"
          $frameworkDependentOut = Join-Path $env:RUNNER_TEMP "publish-no-runtime-uncompressed"

          Remove-Item -LiteralPath $releaseDir, $selfContainedOut, $frameworkDependentOut -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $releaseDir, $selfContainedOut, $frameworkDependentOut | Out-Null

          dotnet publish .\PaperTodo.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o $selfContainedOut `
            /p:PublishSingleFile=true `
            /p:PublishReadyToRun=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:PublishTrimmed=false `
            /p:DebugType=none `
            /p:DebugSymbols=false

          Copy-Item -LiteralPath (Join-Path $selfContainedOut "PaperTodo.exe") -Destination (Join-Path $releaseDir $env:SELF_CONTAINED_EXE)

          dotnet publish .\PaperTodo.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -o $frameworkDependentOut `
            /p:PublishSingleFile=true `
            /p:PublishReadyToRun=false `
            /p:EnableCompressionInSingleFile=false `
            /p:PublishTrimmed=false `
            /p:DebugType=none `
            /p:DebugSymbols=false

          Copy-Item -LiteralPath (Join-Path $frameworkDependentOut "PaperTodo.exe") -Destination (Join-Path $releaseDir $env:FRAMEWORK_DEPENDENT_EXE)

      - name: Write SHA256 checksums
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          $exeFiles = Get-ChildItem -LiteralPath $releaseDir -Filter "*.exe" -File | Sort-Object Name
          if ($exeFiles.Count -ne 2) {
            throw "Expected exactly 2 release executables, found $($exeFiles.Count)."
          }

          $lines = foreach ($file in $exeFiles) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }

          Set-Content -LiteralPath (Join-Path $releaseDir "SHA256SUMS.txt") -Value $lines -Encoding utf8
          Get-ChildItem -LiteralPath $releaseDir -File | Sort-Object Name | Format-Table Name, Length

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release executables
        env:
          SELF_CONTAINED_EXE: ${{ steps.meta.outputs.self_contained_exe }}
          FRAMEWORK_DEPENDENT_EXE: ${{ steps.meta.outputs.framework_dependent_exe }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          $exeFiles = @(
            (Join-Path $releaseDir $env:SELF_CONTAINED_EXE),
            (Join-Path $releaseDir $env:FRAMEWORK_DEPENDENT_EXE)
          )

          foreach ($exe in $exeFiles) {
            if (-not (Test-Path -LiteralPath $exe -PathType Leaf)) {
              throw "Release executable not found: $exe"
            }

            cosign sign-blob `
              --yes `
              --output-signature "$exe.sig" `
              --output-certificate "$exe.crt" `
              "$exe"
          }

          Get-ChildItem -LiteralPath $releaseDir -File | Sort-Object Name | Format-Table Name, Length

      - name: Upload executable package
        uses: actions/upload-artifact@v4
        with:
          name: PaperTodo-v${{ steps.meta.outputs.version }}-win-x64
          if-no-files-found: error
          path: |
            release/${{ steps.meta.outputs.self_contained_exe }}
            release/${{ steps.meta.outputs.self_contained_exe }}.sig
            release/${{ steps.meta.outputs.self_contained_exe }}.crt
            release/${{ steps.meta.outputs.framework_dependent_exe }}
            release/${{ steps.meta.outputs.framework_dependent_exe }}.sig
            release/${{ steps.meta.outputs.framework_dependent_exe }}.crt
            release/SHA256SUMS.txt

      - name: Resolve release tag
        id: release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "${{ inputs.release_tag }}"
            if ([string]::IsNullOrWhiteSpace($tag)) {
              $tag = "v${{ steps.meta.outputs.version }}"
            }
          }

          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'. Got '$tag'."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Write release notes
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          $tag = "${{ steps.release.outputs.tag }}"
          $repo = "${{ github.repository }}"
          $selfContained = "${{ steps.meta.outputs.self_contained_exe }}"
          $frameworkDependent = "${{ steps.meta.outputs.framework_dependent_exe }}"
          $identityPattern = "^https://github[.]com/$repo/[.]github/workflows/release[.]yml@refs/(heads/main|tags/v.*)$"

          @"
          PaperTodo $tag

          What's new:

          - Markdown editing and browsing now share the AvalonEdit Markdown editor, keeping the lightweight Markdown view while reducing preview-state jumps and sync issues.
          - Added capsule auto edge-align: collapsed capsules can arrange at the top-right edge, stay half-hidden, and slide out on hover.
          - Tray paper deletion now keeps the tray menu open after confirmation.

          Windows x64 executables:

          - ${selfContained}: self-contained single file, includes .NET Desktop Runtime, ReadyToRun enabled, single-file compression enabled.
          - ${frameworkDependent}: no-runtime framework-dependent single file, ReadyToRun disabled, single-file compression disabled.

          SHA256 hashes are included in SHA256SUMS.txt.

          Sigstore keyless signatures are included as .sig and .crt files. Verify them with:

          ````powershell
          cosign verify-blob --certificate .\$selfContained.crt --signature .\$selfContained.sig --certificate-identity-regexp "$identityPattern" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" .\$selfContained
          cosign verify-blob --certificate .\$frameworkDependent.crt --signature .\$frameworkDependent.sig --certificate-identity-regexp "$identityPattern" --certificate-oidc-issuer "https://token.actions.githubusercontent.com" .\$frameworkDependent
          ````
          "@.TrimStart() | Set-Content -LiteralPath (Join-Path $releaseDir "RELEASE_NOTES.md") -Encoding utf8

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release"
          $tag = "${{ steps.release.outputs.tag }}"
          $assets = @(
            (Join-Path $releaseDir "${{ steps.meta.outputs.self_contained_exe }}"),
            (Join-Path $releaseDir "${{ steps.meta.outputs.self_contained_exe }}.sig"),
            (Join-Path $releaseDir "${{ steps.meta.outputs.self_contained_exe }}.crt"),
            (Join-Path $releaseDir "${{ steps.meta.outputs.framework_dependent_exe }}"),
            (Join-Path $releaseDir "${{ steps.meta.outputs.framework_dependent_exe }}.sig"),
            (Join-Path $releaseDir "${{ steps.meta.outputs.framework_dependent_exe }}.crt"),
            (Join-Path $releaseDir "SHA256SUMS.txt")
          )
          $notes = Join-Path $releaseDir "RELEASE_NOTES.md"
          $isPrerelease = "${{ inputs.prerelease }}" -eq "true"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
            gh release edit $tag --title "PaperTodo $tag" --notes-file $notes
            if ($isPrerelease) {
              gh release edit $tag --prerelease
            }
          } else {
            $createArgs = @(
              "release", "create", $tag
            ) + $assets + @(
              "--target", $env:GITHUB_SHA,
              "--title", "PaperTodo $tag",
              "--notes-file", $notes
            )

            if ($isPrerelease) {
              $createArgs += "--prerelease"
            }

            gh @createArgs
          }
